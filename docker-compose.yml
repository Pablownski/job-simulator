version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: .
      dockerfile: resources/Dockerfile.php
    container_name: php_api
    ports:
      - "${APP_PORT}:80"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./backend:/var/www/html

  frontend:
    build: ./frontend
    ports:
      - "8088:80"
    depends_on:
      - backend

volumes:
  db_data: